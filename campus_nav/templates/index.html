<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园导航系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">校园导航</span>
        </div>
    </nav>

    <div class="container-fluid mt-2">
        <!-- 搜索栏 -->
        <div class="row mb-2">
            <div class="col">
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control"
                           placeholder="搜索地点（如：食堂、图书馆）">
                    <button class="btn btn-primary" id="searchBtn">搜索</button>
                </div>
                <div id="searchResults" class="list-group mt-1"></div>
            </div>
        </div>

        <!-- 分类筛选 -->
        <div class="row mb-2">
            <div class="col">
                <div class="btn-group flex-wrap" role="group">
                    <button class="btn btn-outline-secondary btn-sm category-btn active"
                            data-category="">全部</button>
                    {% for cat in categories %}
                    <button class="btn btn-outline-secondary btn-sm category-btn"
                            data-category="{{ cat }}">{{ cat }}</button>
                    {% endfor %}
                </div>
            </div>
        </div>

        <!-- 地图 -->
        <div class="row">
            <div class="col">
                <div id="mapContainer"></div>
            </div>
        </div>

        <!-- 路径规划面板 -->
        <div class="card mt-2">
            <div class="card-body p-2">
                <h6 class="card-title">路径规划</h6>
                <div class="row g-2">
                    <div class="col-6">
                        <select id="origSelect" class="form-select form-select-sm">
                            <option value="">选择起点</option>
                            {% for p in pois %}
                            <option value="{{ p.lng }},{{ p.lat }}">{{ p.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-6">
                        <select id="destSelect" class="form-select form-select-sm">
                            <option value="">选择终点</option>
                            {% for p in pois %}
                            <option value="{{ p.lng }},{{ p.lat }}">{{ p.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <button class="btn btn-success btn-sm w-100 mt-2" id="routeBtn">开始导航</button>

                <!-- 多点路径 -->
                <div class="mt-2">
                    <small class="text-muted">多点路径：</small>
                    <div id="multiStops"></div>
                    <div class="btn-group btn-group-sm mt-1">
                        <button class="btn btn-outline-primary" id="addStopBtn">+ 添加途经点</button>
                        <button class="btn btn-outline-success" id="multiRouteBtn">多点导航</button>
                    </div>
                </div>

                <!-- 路径信息 -->
                <div id="routeInfo" class="mt-2" style="display:none;">
                    <span class="badge bg-info" id="routeDistance"></span>
                    <span class="badge bg-warning text-dark" id="routeTime"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://webapi.amap.com/maps?v=2.0&key={{ amap_js_key }}"></script>
    <script>
        const POIS = {{ pois | tojson }};
        const MAP_CENTER = {{ map_center | tojson }};
        const MAP_ZOOM = {{ map_zoom }};
        const CAMPUS_BOUNDARY = {{ campus_boundary | tojson }};
    </script>
    <script src="/static/js/main.js"></script>
</body>
</html>
